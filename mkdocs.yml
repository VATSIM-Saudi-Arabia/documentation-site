site_name: Documentation Site - Saudi Arabian vACC
site_url: https://documentation.vatsimsa.com

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.ico
  font: 
    text: Maven Pro
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.path
    - navigation.top
    - navigation.tabs.sticky
    - search.suggest
    - search.highlight
    - search.share
    - content.footer
    - content.tooltips
    - content.footnote.tooltips
extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://community.vatsim.net
    - icon: fontawesome/brands/instagram 
      link: https://www.instagram.com/vatsim_sa/
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/vatsimsa
    - icon: fontawesome/brands/github
      link: https://github.com/VATSIM-Saudi-Arabia

repo_url: https://github.com/VATSIM-Saudi-Arabia/documentation-site
repo_name: VATSIM-Saudi-Arabia/documentation-site
extra_css:
  - stylesheets/extra.css
  - stylesheets/theme.css
  - stylesheets/effect.css
  - stylesheets/styling.css
markdown_extensions:
  - abbr
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - attr_list
  - footnotes
plugins:
- mkdocs-pdf
- search