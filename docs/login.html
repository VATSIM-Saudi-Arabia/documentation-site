<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In · Saudi Arabian vACC Documentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@600;700&family=Mulish:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#1E3B29;
    --accent:#2f8f52;
    --fg:#F2F2F2;
    --muted:#B8B8B8;
    --line:rgba(255,255,255,0.15);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Mulish',sans-serif;
    color:var(--fg);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;

    /* served from overrides/assets/background.jpg */
    background:#111 url("/assets/background.jpg") no-repeat;
    background-size:cover;
    background-position:center center;
    background-attachment:fixed;
  }

  .overlay{
    position:fixed; inset:0;
    background:rgba(10,10,10,0.45);
    pointer-events:none;
  }

  .card{
    position:relative;
    width:100%;
    max-width:380px;
    padding:36px 32px;
    background:rgba(20,20,20,0.55);
    border:1px solid var(--line);
    border-radius:10px;
    backdrop-filter:blur(6px);
  }

  .logo{
    font-family:'Maven Pro',sans-serif;
    font-size:13px;
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:24px;
  }

  h1{
    font-family:'Maven Pro',sans-serif;
    font-weight:700;
    font-size:22px;
    margin:0 0 6px;
  }
  p.sub{
    margin:0 0 28px;
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
  }

  .vatsim-btn{
    width:100%;
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:var(--primary);
    color:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    padding:12px 16px;
    font-family:'Mulish',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    text-decoration:none;
    transition:background .15s ease;
  }
  .vatsim-btn:hover{ background:var(--accent); }

  .note{
    margin-top:20px;
    font-size:12.5px;
    color:var(--muted);
    line-height:1.5;
    text-align:center;
  }
  .note a{ color:var(--fg); text-decoration:underline; }
</style>
</head>
<body>
  <div class="overlay"></div>

  <div class="card">
    <div class="logo">Saudi Arabian vACC · Documentation</div>

    <h1>Sign in to continue</h1>
    <p class="sub">Access is restricted to authenticated VATSIM members.</p>

    <a class="vatsim-btn" href="/auth/vatsim" id="vatsim-login">
      Sign in with VATSIM Connect
    </a>

    <p class="note">
      No account? Register at <a href="https://my.vatsim.net" target="_blank" rel="noopener">my.vatsim.net</a>
    </p>
  </div>
</body>
</html>
